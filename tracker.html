<script>
(function() {
    // ⚠️ ВАЖНО: Замените URL на адрес вашей подсистемы мониторинга
    const MONITOR_API_URL = 'http://1000-71000-7-2-73eb.twc1.net/api/collect';  // Для локального запуска
    // const MONITOR_API_URL = 'http://IP_ВАШЕГО_СЕРВЕРА:5000/api/collect';  // Для сервера
    
    // Уникальный ID вашего сайта (создайте один раз)
    const TRACKER_ID = 'site_timeweb_1000-71000-7-';  // Можете придумать любой
    
    let sessionId = sessionStorage.getItem('monitor_session_id');
    if (!sessionId) {
        sessionId = 'sess_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        sessionStorage.setItem('monitor_session_id', sessionId);
    }
    
    function sendEvent(eventType, eventData) {
        fetch(MONITOR_API_URL, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                tracker_id: TRACKER_ID,
                session_id: sessionId,
                event_type: eventType,
                url: window.location.href,
                referrer: document.referrer,
                event_data: eventData || {},
                time_on_page: Math.floor((Date.now() - window.performance.timing.navigationStart) / 1000)
            })
        }).catch(e => console.log('Monitor error:', e));
    }
    
    // Отправляем просмотр страницы
    sendEvent('pageview', { title: document.title });
    
    // Отслеживаем отправку форм
    document.querySelectorAll('form').forEach(form => {
        form.addEventListener('submit', function() {
            sendEvent('form_submit', { form_id: this.id || 'unknown' });
        });
    });
    
    console.log('✅ Монитор обращений граждан подключен');
})();
</script>
